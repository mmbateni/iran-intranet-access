name: Iran Intranet Config Collector

# Direction A — Diaspora / researchers OUTSIDE Iran → SHOMA
#
# GitHub Free Tier budget:
#   2 runs/day × ~15 min = ~900 min/month  (limit: 2,000 min/month)
#
# Schedule — Tehran business hours:
# UTC        IRDT (summer UTC+4:30)
# 03:30      08:00  morning
# 13:30      18:00  evening

on:
  schedule:
    - cron: "30  3 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      probe_enabled:
        description: "Enable HTTP-level liveness probing (slower but more accurate)"
        required: false
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TCP_TIMEOUT:          "4"
  MAX_WORKERS:          "60"
  SKIP_V2RAY_TEST:      "1"
  MIN_PASSING_CONFIGS:  "30"   # lowered — HTTP probe eliminates more dead configs
  # HTTP probe: set to "1" for manual runs when you want accurate results.
  # Disabled by default on scheduled runs to keep runtime under 30 min.
  PROBE_ENABLED:        "0"

jobs:
  collect:
    name: Collect & Verify Intranet Configs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout iran-proxy-checker outputs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.IRAN_PROXY_CHECKER_REPO || format('{0}/iran-proxy-checker', github.repository_owner) }}
          path: iran-proxy-checker
          sparse-checkout: |
            armenia_iran_bridge_configs.txt
            armenia_iran_bridge_configs.json
            passing_intranet_configs.txt
            passing_intranet_configs.json
            ir_exit_configs.txt
            ir_mobile_exit_configs.txt
            passing_intranet_configs_base64.txt
          sparse-checkout-cone-mode: false
          token: ${{ secrets.IRAN_PROXY_TOKEN || github.token }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Collect and verify configs
        run: python collect_configs.py
        env:
          IRAN_PROXY_CHECKER_DIR: iran-proxy-checker
          TCP_TIMEOUT:            ${{ env.TCP_TIMEOUT }}
          MAX_WORKERS:            ${{ env.MAX_WORKERS }}
          SKIP_V2RAY_TEST:        ${{ env.SKIP_V2RAY_TEST }}
          MIN_PASSING_CONFIGS:    ${{ env.MIN_PASSING_CONFIGS }}
          # Use workflow_dispatch input if provided, else env default
          PROBE_ENABLED: ${{ github.event.inputs.probe_enabled || env.PROBE_ENABLED }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intranet-configs-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            outputs/passing_intranet_configs.txt
            outputs/passing_intranet_configs.json
            outputs/passing_intranet_configs_base64.txt
            outputs/ir_exit_configs.txt
            outputs/ir_reality_configs.txt
            outputs/ir_mobile_exit_configs.txt
            outputs/armenian_bridge_configs.txt
            outputs/by_protocol/

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ || true
          git diff --cached --quiet || \
            git commit -m "chore: update configs $(date -u +'%Y-%m-%d %H:%M') UTC"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push
