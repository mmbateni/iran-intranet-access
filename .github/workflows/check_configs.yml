name: Iran Intranet Config Collector

# Runs daily to refresh the config list.
# Also pulls the latest verified outputs from iran-proxy-checker (Armenian bridge
# configs that are already proven to route into Iranian IP space).
on:
  schedule:
    - cron: "30 3 * * *"   # 03:30 UTC daily — 30 min after iran-proxy-checker finishes
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    name: Collect & Verify Intranet Configs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # ── Pull verified bridge configs from iran-proxy-checker ─────────────────
      # These configs already passed the Armenian bridge test — they are the
      # highest-priority candidates for Iranian intranet access.
      - name: Checkout iran-proxy-checker outputs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.IRAN_PROXY_CHECKER_REPO || format('{0}/iran-proxy-checker', github.repository_owner) }}
          path: iran-proxy-checker
          sparse-checkout: |
            armenia_iran_bridge_configs.txt
            armenia_iran_bridge_configs.json
            working_armenia_configs.txt
            working_armenia_configs.json
            passing_intranet_configs.txt
            passing_all_ranked.json
          sparse-checkout-cone-mode: false
          token: ${{ secrets.IRAN_PROXY_TOKEN || github.token }}
        continue-on-error: true   # non-fatal if repo is private or not yet set up

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp aiohttp-socks

      - name: Collect and verify intranet configs
        run: python collect_configs.py
        env:
          IRAN_PROXY_CHECKER_DIR: iran-proxy-checker
          TCP_TIMEOUT:    "3"
          HTTP_TIMEOUT:   "10"
          MAX_WORKERS:    "100"
          # On GitHub-hosted runners (Azure North America), Iranian internal IPs
          # are not directly reachable so we rely on GeoIP for verification.
          # Set to 0 on a self-hosted runner in Europe/Armenia for live testing.
          SKIP_V2RAY_TEST: "1"
          # Job fails if fewer than this many configs pass — catches source outages.
          # Lower if you expect temporarily fewer sources; raise for stricter health checks.
          MIN_PASSING_CONFIGS: "200"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # Date-stamped name for easier identification vs run-ID-only names
          name: intranet-configs-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            outputs/passing_intranet_configs.txt
            outputs/passing_intranet_configs_annotated.txt
            outputs/passing_intranet_configs.json
            outputs/passing_intranet_configs_base64.txt
            outputs/ir_exit_configs.txt
            outputs/armenian_bridge_configs.txt
            outputs/hiddify_intranet.json
            outputs/by_protocol/

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add outputs/ || true

          git diff --cached --quiet || \
            git commit -m "chore: update intranet configs $(date -u +'%Y-%m-%d %H:%M') UTC"

          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git push
